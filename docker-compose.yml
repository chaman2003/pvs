services:
  web:
    image: sunilbalaji2004/pvs-promoters:latest
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - sunilbalaji2004/pvs-promoters:latest
        - pvs-web:latest
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  uploads_data:
