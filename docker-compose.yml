services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: sunilbalaji2004/pvs-promoters:latest
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - sunilbalaji2004/pvs-promoters:latest
        - pvs-web:latest
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongodb:27017/pvs_promoters}
      DATA_DIR: /app/data
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads
      - app_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
  uploads_data:
  app_data:
