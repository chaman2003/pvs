# Production: web container only — database is MongoDB Atlas (set MONGO_URI in .env).
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  web:
    image: sunilbalaji2004/pvs-promoters:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  uploads_data:
